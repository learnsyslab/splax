name: Ruff
on:
  push:
    branches: [main]
  pull_request:
jobs:
  ruff-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.9.3
        with:
          pixi-version: v0.72.2
          environments: lint
          activate-environment: false
          locked: true
      - run: pixi run -e lint ruff-check

  ruff-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.9.3
        with:
          pixi-version: v0.72.2
          environments: lint
          activate-environment: false
          locked: true
      - run: pixi run -e lint ruff-format-check

