site_name: splax
site_description: Differentiable 3D gaussian splatting for JAX with NVIDIA Warp kernels
site_url: https://learnsyslab.github.io/splax/
repo_name: learnsyslab/splax
repo_url: https://github.com/learnsyslab/splax

docs_dir: docs

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/logo.svg
  features:
    - content.code.copy
    - navigation.indexes
    - navigation.tabs
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.suggest
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: light blue
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/weather-night
        name: Switch to light mode

nav:
  - Home: index.md
  - Get Started:
    - Installation: get-started/install.md
    - Quickstart: get-started/quickstart.md
  - User Guide:
    - Rendering: user-guide/rendering.md
    - Training: user-guide/training.md
    - COLMAP Workflow: user-guide/colmap.md
    - Batching: user-guide/batching.md
    - IO: user-guide/io.md
    - Viewer: user-guide/viewer.md
  - API Reference: api/

plugins:
  - search
  - autorefs
  - gen-files:
      scripts:
        - docs/gen_ref_pages.py
  - literate-nav:
      nav_file: SUMMARY.md
  - section-index
  - mkdocstrings:
      handlers:
        python:
          paths: ["."]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_category_heading: true
            merge_init_into_class: true
            show_submodules: false

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/learnsyslab/splax

watch:
  - splax/
